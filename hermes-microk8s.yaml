apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-pvc
spec:
  storageClassName: openebs-jiva-csi-default
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      initContainers:
      - name: install-deps
        image: nousresearch/hermes-agent:latest
        command:
        - /bin/sh
        - -c
        - |
          uv pip install \
            --target /opt/python-packages \
            python-telegram-bot
        volumeMounts:
        - mountPath: /opt/python-packages
          name: shared-packages
      containers:
      - name: hermes
        image: nousresearch/hermes-agent:latest
        args: ["gateway", "run"]
        env:
        - name: PYTHONPATH
          value: "/opt/python-packages"
        - name: HERMES_DASHBOARD
          value: "1"
        - name: API_SERVER_ENABLED
          value: "true"
        - name: API_SERVER_HOST
          value: "0.0.0.0"
        - name: API_SERVER_KEY
          value: "super_secret_key"
        - name: OUTPUT_DIR
          value: "/opt/data/cache/documents"
        ports:
        - containerPort: 8642
          name: api-port
        - containerPort: 9119
          name: dash-port
        resources:
          limits:
            cpu: "2.0"
            memory: 4Gi
          requests:
            cpu: "1.0"
            memory: 2Gi
        volumeMounts:
        - mountPath: /opt/data
          name: hermes-storage
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /opt/python-packages
          name: shared-packages
      volumes:
        - name: shared-packages
          emptyDir: {}
        - name: hermes-storage
          persistentVolumeClaim:
            claimName: hermes-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-service
spec:
  type: NodePort
  selector:
    app: hermes
  ports:
    - name: gateway-api
      protocol: TCP
      port: 8642
      targetPort: 8642
      nodePort: 31642
    - name: dashboard
      protocol: TCP
      port: 9119
      targetPort: 9119
      nodePort: 31119
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubuntu-ssh
  labels:
    app: ubuntu-ssh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubuntu-ssh
  template:
    metadata:
      labels:
        app: ubuntu-ssh
    spec:
      containers:
      - name: ubuntu-ssh
        image: localhost:32000/ubuntu-sshd:24.04
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /home/ubuntu/.ssh && \
          echo "$PUBLIC_KEY" > /home/ubuntu/.ssh/authorized_keys && \
          chmod 700 /home/ubuntu/.ssh && \
          chmod 600 /home/ubuntu/.ssh/authorized_keys && \
          chown -R ubuntu:ubuntu /home/ubuntu && \
          ssh-keygen -A && \
          exec /usr/sbin/sshd -D -e
        env:
        - name: PUBLIC_KEY
          value: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEl3pctYrLZIpTCdVcFtFtdMVBgaTsJvZFdaOG6LZWmm ubuntu@adorable-anurognathus"
        ports:
        - containerPort: 22
        resources:
          limits:
            cpu: "0.5"
            memory: 512Mi
          requests:
            cpu: "0.1"
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ubuntu-ssh
spec:
  selector:
    app: ubuntu-ssh
  ports:
  - port: 22
    targetPort: 22
  type: ClusterIP
